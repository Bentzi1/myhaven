<!DOCTYPE html>
<html lang="en" dir="ltr">

                    class="w-full h-full bg-transparent resize-none outline-none text-[#111827] placeholder-[#9CA3AF] text-lg leading-relaxed"

                AI Anonymity Check
            </button>
        </div>

    </div>
